name: "Build and Export Game"
on:
  workflow_dispatch:
  pull_request:
  release:
    types:
      - published
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}

env:
  PCK_NAME: threadbare

jobs:
  build:
    name: Build for web
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Create Git LFS file list
        run: git lfs ls-files -l |cut -d' ' -f1 |sort >.git/lfs-hashes.txt

      - name: Restore Git LFS object cache
        uses: actions/cache@v5
        with:
          path: .git/lfs
          key: ${{ runner.os }}-lfsdata-v1-${{ hashFiles('.git/lfs-hashes.txt') }}
          restore-keys: |
            ${{ runner.os }}-lfsdata-v1-
            ${{ runner.os }}-lfsdata

      - name: Fetch any needed Git LFS objects and prune extraneous ones
        run: git lfs fetch --prune

      - name: Check out Git LFS content
        run: git lfs checkout

      - name: Export web build
        uses: endlessm/godot-export-action@v2
        with:
          godot_version: "4.6.1"

      - name: Upload web artifact
        uses: actions/upload-artifact@v7
        with:
          name: web
          path: build/web

  release:
    name: Attach to release
    needs: [build]
    if: ${{ github.event_name == 'release' }}
    runs-on: ubuntu-latest
    steps:
      - name: Download web bundle
        uses: actions/download-artifact@v8
        with:
          name: web
          path: web

      - name: Attach PCK
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          mv web/index.pck '${{ env.PCK_NAME }}-${{ github.ref_name }}.pck'
          gh release upload '${{ github.ref_name }}' '${{ env.PCK_NAME }}-${{ github.ref_name }}.pck' --repo '${{ github.repository }}'

      - name: Attach web bundle to release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          pushd web
          zip -r "../threadbare-${{ github.ref_name }}-web.zip" .
          popd

          gh release upload '${{ github.ref_name }}' 'threadbare-${{ github.ref_name }}-web.zip' --repo '${{ github.repository }}'
